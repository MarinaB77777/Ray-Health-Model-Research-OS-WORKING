<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Health Model Pilot</title>
<style>
body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; }
.card { border: 1px solid #ddd; border-radius: 12px; padding: 18px; margin-bottom: 16px; }
button { padding: 10px 16px; margin: 6px 6px 6px 0; cursor: pointer; }
input { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }
.hidden { display: none; }
.small { color: #665; font-size: 14px; }
.option-row {
  display: block;
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 10px 12px;
  margin: 8px 0;
  cursor: pointer;
}

.option-row:hover {
  background: #f3f6ff;
}

.option-row input {
  width: auto;
  margin-right: 8px;
}
pre { background:#f6f6f6; padding:12px; overflow:auto; }
</style>
</head>
<body>

<h1>Health Model Pilot</h1>
<p id="status" class="small">Page loaded</p>

<div id="languageScreen" class="card screen">
  <h2>Seleccione idioma / Choose language / Выберите язык</h2>
  <button type="button" onclick="setLanguage('es')">Español</button>
  <button type="button" onclick="setLanguage('en')">English</button>
  <button type="button" onclick="setLanguage('ru')">Русский</button>
</div>

<div id="loginScreen" class="card screen hidden">
  <h2 id="loginTitle">Вход</h2>
  <button type="button" onclick="createAccount()" id="createIdButton">Создать новый ID</button>
  <hr>
  <p id="existingIdText">Уже есть ID:</p>
  <input id="accountIdInput" placeholder="Введите account_id">
  <button type="button" onclick="loadAccount()" id="loginButton">Войти</button>
  <button type="button" onclick="resetLocal()" id="resetLoginIdButton">Сбросить сохранённый ID</button>
</div>

<div id="cabinetScreen" class="card screen hidden">
  <h2 id="cabinetTitle">Личный кабинет</h2>
  <p><span id="yourIdText">Ваш ID:</span> <b id="accountIdView"></b></p>
  <button type="button" onclick="copyAccountId()" id="copyIdButton">Скопировать ID</button>
  <button type="button" onclick="resetLocal()" id="resetIdButton">Сбросить сохранённый ID</button>
  <button type="button" onclick="logoutToLogin()" id="loginOtherIdButton">Войти с другим ID</button> 

  <h3 id="availableStudiesTitle">Доступные исследования</h3>
  <div id="availableStudiesList" class="small">
    Loading studies...
  </div>
</div>
<div id="consentScreen" class="card screen hidden">
  <h2 id="consentTitle">Согласие</h2>
  <div id="consentDocument"></div>

  <label>
    <input type="checkbox" id="consentCheckbox">
    <span id="consentCheckboxText">Я согласен(на) участвовать</span>
  </label>

  <br>

  <button type="button" onclick="startSession()" id="startButton">Начать</button>
  <button type="button" onclick="showScreen('cabinetScreen')" id="backButton">Назад</button>
</div>
<div id="questionnaireScreen" class="card screen hidden">
  <h2 id="questionnaireTitle">Анкета</h2>
  <p id="questionnaireText">Ответьте на вопросы.</p>

  <div id="questionBlock"></div>

  <button type="button" onclick="submitQuestionnaire()" id="submitAnswersButton">
    Отправить ответы
  </button>

  <pre id="sessionResult"></pre>
  <div id="participantReport" class="card hidden"></div>
</div>

<script>
let currentAccountId = null;
let selectedStudy = null;
let currentLang = localStorage.getItem("health_model_lang") || null;
let currentSessionId = null;
let currentAssessment = null;
let questionnaireStartedAt = null;

const T = {
  ru: {
    loginTitle: "Вход",
    createIdButton: "Создать новый ID",
    existingIdText: "Уже есть ID:",
    accountPlaceholder: "Введите account_id",
    loginButton: "Войти",
    cabinetTitle: "Личный кабинет",
    yourIdText: "Ваш ID:",
    copyIdButton: "Скопировать ID",
    resetIdButton: "Сбросить сохранённый ID",
    resetLoginIdButton: "Сбросить сохранённый ID",
    availableStudiesTitle: "Доступные исследования",
    introButton: "Знакомство",
    resourceButton: "Истощение ресурсов",
    decisionButton: "Принятие решений",
    duButton: "Принятие решений в условиях неопределенности",
    consentTitle: "Согласие",
    consentText: "Участие добровольное. Без согласия сессия не создаётся.",
    consentCheckboxText: "Я согласен(на) участвовать",
    startButton: "Начать",
    backButton: "Назад",
    questionnaireTitle: "Анкета",
    questionnaireText: "Сессия создана.",
    idNotFound: "ID не найден",
    consentRequired: "Необходимо принять согласие",
    copied: "ID скопирован",
    submitAnswersButton: "Отправить ответы"
  },
  en: {
    loginTitle: "Sign in",
    createIdButton: "Create new ID",
    existingIdText: "Already have an ID:",
    accountPlaceholder: "Enter account_id",
    loginButton: "Sign in",
    cabinetTitle: "Personal cabinet",
    yourIdText: "Your ID:",
    copyIdButton: "Copy ID",
    resetIdButton: "Reset saved ID",
    resetLoginIdButton: "Reset saved ID",
    loginOtherIdButton: "Sign in with another ID",
    availableStudiesTitle: "Available studies",
    introButton: "Introduction",
    resourceButton: "Resource depletion",
    decisionButton: "Decision making",
    duButton: "Decision Making Under Uncertainty",
    consentTitle: "Consent",
    consentText: "Participation is voluntary. No session is created without consent.",
    consentCheckboxText: "I agree to participate",
    startButton: "Start",
    backButton: "Back",
    questionnaireTitle: "Questionnaire",
    questionnaireText: "Session created.",
    idNotFound: "ID not found",
    consentRequired: "Consent is required",
    copied: "ID copied",
    submitAnswersButton: "Submit answers",
  },
  es: {
    loginTitle: "Entrada",
    createIdButton: "Crear nuevo ID",
    existingIdText: "Ya tengo ID:",
    accountPlaceholder: "Introduce account_id",
    loginButton: "Entrar",
    cabinetTitle: "Gabinete personal",
    yourIdText: "Tu ID:",
    copyIdButton: "Copiar ID",
    resetIdButton: "Restablecer ID guardado",
    resetLoginIdButton: "Restablecer ID guardado",
    loginOtherIdButton: "Entrar con otro ID",
    availableStudiesTitle: "Estudios disponibles",
    introButton: "Introducción",
    resourceButton: "Agotamiento de recursos",
    decisionButton: "Toma de decisiones",
    duButton: "Toma de decisiones bajo incertidumbre",
    consentTitle: "Consentimiento",
    consentText: "La participación es voluntaria. Sin consentimiento no se crea una sesión.",
    consentCheckboxText: "Acepto participar",
    startButton: "Empezar",
    backButton: "Atrás",
    questionnaireTitle: "Cuestionario",
    questionnaireText: "Sesión creada.",
    idNotFound: "ID no encontrado",
    consentRequired: "Se requiere consentimiento",
    copied: "ID copiado",
    submitAnswersButton: "Enviar respuestas"
  }
};

function setStatus(text) {
  document.getElementById("status").innerText = text;
}

function showScreen(screenId) {
  document.querySelectorAll(".screen").forEach(el => el.classList.add("hidden"));
  document.getElementById(screenId).classList.remove("hidden");
  setStatus("Screen: " + screenId);
}

function applyLanguage() {
  const t = T[currentLang || "ru"];

  Object.keys(t).forEach(key => {
    if (key === "accountPlaceholder") {
      document.getElementById("accountIdInput").placeholder = t[key];
      return;
    }

    const el = document.getElementById(key);
    if (el) el.innerText = t[key];
  });
}
    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem("health_model_lang", lang);
      applyLanguage();
      showScreen("loginScreen");
    }

async function createAccount() {
  setStatus("Creating account...");

  const response = await fetch("/pilot/accounts", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ preferred_language: currentLang || "ru" })
  });

  const data = await response.json();
  console.log("start-session response:", data);
  console.log("selectedStudy:", selectedStudy);
  console.log("currentAccountId:", currentAccountId);
  
  if (!response.ok || !data.account_id) {
    alert(JSON.stringify(data));
    setStatus("Create account failed");
    return;
  }

  currentAccountId = data.account_id;
  localStorage.setItem("health_model_account_id", currentAccountId);
  showCabinet();
}

async function loadAccount() {
  const t = T[currentLang || "ru"];
  const accountId = document.getElementById("accountIdInput").value.trim();

  if (!accountId) {
    alert("Введите account_id");
    return;
  }

  setStatus("Loading account...");

  const response = await fetch("/pilot/accounts/" + encodeURIComponent(accountId));
  const data = await response.json();

  if (!response.ok || !data.ok) {
    alert(t.idNotFound);
    setStatus("Account not found");
    return;
  }

  currentAccountId = data.account_id;
  localStorage.setItem("health_model_account_id", currentAccountId);
  showCabinet();
}

    function showCabinet() {
      applyLanguage();
      document.getElementById("accountIdView").innerText = currentAccountId;
      showScreen("cabinetScreen");
      loadAvailableStudies();
    }

    async function loadAvailableStudies() {
      const box = document.getElementById("availableStudiesList");

      if (!box) return;

      box.innerHTML = "Loading studies...";

      const response = await fetch(
        "/pilot/questionnaire-banks?project_id=health_model_pilot"
      );

      const data = await response.json();

      if (!response.ok || !data.ok) {
        box.innerHTML = "Studies failed to load.";
        return;
      }

      const enabledBanks = (data.banks || []).filter(bank => bank.enabled);

      if (enabledBanks.length === 0) {
        box.innerHTML = "No studies are currently connected.";
        return;
      }

      box.innerHTML = enabledBanks.map(bank => {
        const title =
          bank.title_by_lang?.[currentLang || "ru"] ||
          bank.title_by_lang?.ru ||
          bank.id;

        return `
          <button type="button" onclick="selectStudy('${bank.id}')">
            ${title}
          </button>
        `;
      }).join("");
    }

function copyAccountId() {
  const t = T[currentLang || "ru"];
  navigator.clipboard.writeText(currentAccountId);
  alert(t.copied);
}

async function selectStudy(studyId) {
  selectedStudy = studyId;
  applyLanguage();
  document.getElementById("consentCheckbox").checked = false;
  await loadConsent();
  showScreen("consentScreen");
}

async function loadConsent() {
  const lang = currentLang || "ru";

  const response = await fetch(`/consent/pilot_v1/${lang}?v=1`);

  if (!response.ok) {
    document.getElementById("consentDocument").innerHTML =
      "<p>Consent file not found.</p>";
    return;
  }

  const html = await response.text();
  document.getElementById("consentDocument").innerHTML = html;
}

    async function startSession() {
      const t = T[currentLang || "ru"];

      if (!selectedStudy) {
        alert("Study not selected");
        showScreen("cabinetScreen");
        return;
      }

      if (!document.getElementById("consentCheckbox").checked) {
        alert(t.consentRequired);
        return;
      }

      setStatus("Starting session...");

      const response = await fetch("/pilot/accounts/start-session", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          account_id: currentAccountId,
          participant_role: "participant",
          study_id: selectedStudy,
          consent_record: {
            consent_status: "granted",
            consent_version: "consent-policy-1",
            consent_scope: ["pilot_participation"],
            granted_at: new Date().toISOString(),
            revoked_at: null,
            expiration_at: null,
            consent_basis: "explicit_checkbox",
            notes: null,
            language: currentLang || "ru",
            assessment_logic_id: selectedStudy,
            study_id: selectedStudy,
          }
        })
      });

      const data = await response.json();

      if (!response.ok || !data.ok) {
        alert(data.detail || "Session start failed");
        setStatus("Start session failed: " + response.status);
        return;
      }

      currentSessionId = data.session_id;

      await renderQuestionnaire();
      showScreen("questionnaireScreen");
    }

    async function renderQuestionnaire() {
      const response = await fetch(
        "/question-banks/" +
        encodeURIComponent(selectedStudy) +
        "?lang=" +
        encodeURIComponent(currentLang || "ru")
      );

      const data = await response.json();

      if (!response.ok || !data.ok) {
        alert(JSON.stringify(data));
        setStatus("Question bank load failed");
        return;
      }

      currentAssessment = {
        assessment_id: data.bank_id,
        title: { [currentLang || "ru"]: data.bank_id },
        description: { [currentLang || "ru"]: "" },
        questions: data.questions || []
      };

      questionnaireStartedAt = new Date().toISOString();

      document.getElementById("questionnaireTitle").innerText =
        currentAssessment.title[currentLang || "ru"] ||
        currentAssessment.assessment_id;

      document.getElementById("questionnaireText").innerText =
        currentAssessment.description[currentLang || "ru"] || "";

      const questions = currentAssessment.questions || [];

      document.getElementById("questionBlock").innerHTML =
        questions.map(renderQuestion).join("");
    }

    function renderQuestion(q) {
      const prompt = q.prompt || q.text?.[currentLang || "ru"] || q.code;

      if (q.type === "number" || q.type === "numeric") {
        return `
          <div class="card">
            <label>
              <b>${q.code}</b><br>
              ${prompt}
              <input id="answer_${q.code}" type="number">
            </label>
          </div>
        `;
      }

      if (q.type === "text") {
        return `
          <div class="card">
            <label>
              <b>${q.code}</b><br>
              ${prompt}
              <input id="answer_${q.code}" type="text">
            </label>
          </div>
        `;
      }

      if (q.type === "multi_select" || q.type === "multiple_choice") {
        return `
          <div class="card">
            <b>${q.code}</b><br>
            <p>${prompt}</p>
            ${(q.options || []).map(opt => `
              <label>
              <label class="option-row">
                <input type="checkbox" name="answer_${q.code}" value="${opt.value}">
                ${opt.text}
              </label><br>
            `).join("")}
          </div>
        `;
      }

      return `
        <div class="card">
          <b>${q.code}</b><br>
          <p>${prompt}</p>
          ${(q.options || []).map(opt => `
            <label>
            <label class="option-row">
              <input type="radio" name="answer_${q.code}" value="${opt.value}">
              ${opt.text}
            </label><br>
          `).join("")}
        </div>
      `;
    }

    function collectAnswer(q) {
      if (q.type === "number" || q.type === "numeric") {
        const el = document.getElementById("answer_" + q.code);
        if (!el || el.value === "") return undefined;
        return Number(el.value);
      }

      if (q.type === "text") {
        const el = document.getElementById("answer_" + q.code);
        if (!el || el.value.trim() === "") return undefined;
        return el.value.trim();
      }

      if (q.type === "multi_select" || q.type === "multiple_choice") {
        const selected = Array.from(
          document.querySelectorAll(`input[name="answer_${q.code}"]:checked`)
        ).map(el => {
          const raw = el.value;
          return raw === "null" ? null : (isNaN(Number(raw)) ? raw : Number(raw));
        });

        return selected.length ? selected : undefined;
      }

      const selected = document.querySelector(
        `input[name="answer_${q.code}"]:checked`
      );

      if (!selected) return undefined;

      const raw = selected.value;
      return raw === "null" ? null : (isNaN(Number(raw)) ? raw : Number(raw));
    }
    
    function renderParticipantReport(report) {
      const box = document.getElementById("participantReport");

      if (!report || !report.resource_cards || report.resource_cards.length === 0) {
          box.classList.add("hidden");
          return;
        }

      box.classList.remove("hidden");

      box.innerHTML = `
        <h2>${report.title || "Результат"}</h2>
        <p>${report.summary || ""}</p>

        ${report.resource_cards.map(card => `
          <div class="card">
            <h3>${card.title}</h3>
            <p><b>${card.level_label}</b></p>

            <p>${card.summary || ""}</p>

            <h4>На что стоит обратить внимание</h4>
            <p>${card.what_may_be_sensitive || ""}</p>

            <h4>Как это может влиять на решения</h4>
            <p>${card.decision_context || ""}</p>
          </div>
        `).join("")}

        <h3>Ограничения</h3>
        <ul>
          ${(report.limitations || []).map(item => `<li>${item}</li>`).join("")}
        </ul>
      `;
    }
    
async function submitQuestionnaire() {
  const questions = currentAssessment?.questions || [];
  const answers = {};
  const submitButton = document.getElementById("submitAnswersButton");

  submitButton.disabled = true;
  setStatus("Submitting answers...");

  questions.forEach(q => {
    const value = collectAnswer(q);

    if (value !== undefined) {
      answers[q.code] = value;
    }
  });

  const collectionFinishedAt = new Date().toISOString();

  const domainDataIdentity = {
    source_instance_id: crypto.randomUUID
      ? crypto.randomUUID()
      : "questionnaire-" + Date.now(),

    session_id: currentSessionId,
    participant_id: currentAccountId,

    domain_id: "questionnaire",
    source_type: "self_report",
    data_structure_type: "question_bank",

    data_source_path: selectedStudy,

    collection_started_at: questionnaireStartedAt,
    collection_finished_at: collectionFinishedAt,

    global_time_reference: currentSessionId
  };
  
  const saveResponse = await fetch("/pilot/sessions/" + currentSessionId + "/answers", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      domain_data_identity: domainDataIdentity,
      answers
    })
  });

  const saveData = await saveResponse.json();

  if (!saveResponse.ok || !saveData.ok) {
    submitButton.disabled = false;
    document.getElementById("sessionResult").innerText = JSON.stringify(saveData, null, 2);
    setStatus("Answer submit failed");
    return;
  }

  setStatus("Running session...");

  const runResponse = await fetch("/pilot/sessions/" + currentSessionId + "/run", {
    method: "POST"
  });

  const runData = await runResponse.json();

  if (!runResponse.ok || !runData.ok) {
    document.getElementById("sessionResult").innerText = JSON.stringify(runData, null, 2);
    setStatus("Run failed");
    return;
  }

  setStatus("Loading result...");

  const resultResponse = await fetch("/pilot/sessions/" + currentSessionId + "/result");
  const resultData = await resultResponse.json();

  document.getElementById("sessionResult").classList.add("hidden");

  const reportResponse = await fetch(
    "/pilot/sessions/" + currentSessionId + "/participant-report"
  );

  const reportData = await reportResponse.json();

  if (reportResponse.ok && reportData.ok) {
    renderParticipantReport(reportData.participant_report);
  }

  setStatus("Completed");

  submitButton.innerText =
    currentLang === "en" ? "Submitted" :
    currentLang === "es" ? "Enviado" :
    "Ответы отправлены";
    
    window.location.href =
      "/pilot-result?session_id=" + encodeURIComponent(currentSessionId);
}
function logoutToLogin() {
  localStorage.removeItem("health_model_account_id");
  currentAccountId = null;
  document.getElementById("accountIdInput").value = "";
  showScreen("loginScreen");
}

function resetLocal() {
  localStorage.removeItem("health_model_account_id");
  localStorage.removeItem("health_model_lang");
  currentAccountId = null;
  currentLang = null;
  selectedStudy = null;
  showScreen("languageScreen");
}

document.addEventListener("DOMContentLoaded", () => {
  setStatus("JS started");

  currentLang = null;
  currentAccountId = null;
  selectedStudy = null;

  localStorage.removeItem("health_model_lang");
  localStorage.removeItem("health_model_account_id");

  showScreen("languageScreen");
});

</script>

</body>
</html>
